name: Latest YouTube Videos
on:
  schedule:
    # Runs every day
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme-with-youtube:
    name: Update this repo's README with latest videos from YouTube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "YOUTUBE"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCrMzOvZWrtzjLQxfWt_EzXw, https://www.youtube.com/feeds/videos.xml?channel_id=https://www.youtube.com/channel/UC3GprUkYhIu5ZnU6ASLWoDg, https://www.youtube.com/channel/UCLnyLVNDcrila0tTQcn4_Gw"
